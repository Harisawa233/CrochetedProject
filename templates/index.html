<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钩针图纸生成器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🧶 钩针助手</h1>
        <p class="subtitle"></p>
        
        <form id="uploadForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">上传图片</label>
                <input type="file" name="file" id="fileInput" required>
            </div>
            
            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-medium">宽度 (针数)</label>
                    <input type="number" name="width" id="widthInput" required>
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-medium">高度 (行数)</label>
                    <input type="number" name="height" id="heightInput" required>
                </div>
            </div>

            <button type="submit" id="submitBtn">
                生成图纸
            </button>
        </form>

        <div id="result" class="hidden result-box">
            <h3 class="text-lg font-semibold mb-4">预览结果：</h3>
            <div class="mb-4">
                <img id="preview" src="" alt="生成的图纸">
            </div>
            <a id="downloadLink" href="#" class="btn">
                下载图纸
            </a>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "生成中...";
            btn.disabled = true;

            const formData = new FormData(e.target);
            const response = await fetch('/', { method: 'POST', body: formData });
            const data = await response.json();
            
            document.getElementById('preview').src = data.image_url + '?' + new Date().getTime();
            document.getElementById('downloadLink').href = data.image_url;
            document.getElementById('result').classList.remove('hidden');
            
            btn.innerText = "生成图纸";
            btn.disabled = false;
        };

        document.getElementById('fileInput').onchange = async (e) => {
            if (!e.target.files[0]) return;
            const formData = new FormData();
            formData.append('file', e.target.files[0]);
            const response = await fetch('/get_ratio', { method: 'POST', body: formData });
            const data = await response.json();
            document.getElementById('widthInput').value = data.width;
            document.getElementById('heightInput').value = data.height;
        };
    </script>
</body>
</html>
